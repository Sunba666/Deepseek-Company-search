services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobnav
      POSTGRES_USER: jobnav
      POSTGRES_PASSWORD: jobnav123
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U jobnav"], interval: 5s, timeout: 5s, retries: 5 }

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 5 }

  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports: ["9200:9200"]
    volumes: [es-data:/usr/share/elasticsearch/data]
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:9200"], interval: 10s, timeout: 5s, retries: 5 }

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-data:/data]
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"], interval: 10s, timeout: 5s, retries: 5 }

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports: ["3001:3001"]
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://jobnav:jobnav123@postgres:5432/jobnav?schema=public
      REDIS_URL: redis://redis:6379
      ES_URL: http://elasticsearch:9200
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: jobnav
      JWT_SECRET: docker-dev-jwt-secret
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
      minio: { condition: service_healthy }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on: [backend]

volumes:
  postgres-data:
  redis-data:
  es-data:
  minio-data:
