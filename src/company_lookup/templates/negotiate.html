{% extends "base.html" %}
{% from "macros.html" import spinner %}
{% block content %}
<div class="mt-4">
    <h1 class="text-center mb-2"><i class="bi bi-chat-quote"></i> 薪资谈判助手</h1>
    <p class="text-center text-muted mb-4">输入薪资期望，AI 帮你制定谈判策略</p>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white"><h5 class="mb-0"><i class="bi bi-file-text"></i> 输入信息</h5></div>
                <div class="card-body">
                    <form hx-post="{{ url_for('company.negotiate') }}"
                          hx-target="#negotiate-result-area"
                          hx-swap="innerHTML"
                          hx-indicator="#negotiate-spinner">
                        <div class="mb-3">
                            <label class="form-label">目标公司</label>
                            <input type="text" name="company_name" class="form-control" required placeholder="例如：阿里巴巴">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">当前薪资（可选）</label>
                            <input type="text" name="current_salary" class="form-control" placeholder="例如：25K/月">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">期望薪资</label>
                            <input type="text" name="expected_salary" class="form-control" placeholder="例如：35K/月">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">其他 Offer（可选）</label>
                            <textarea name="other_offers" class="form-control" rows="3" placeholder="每行一个，例如：腾讯 32K/月"></textarea>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100">生成谈判建议</button>
                    </form>
                    {{ spinner('negotiate-spinner', 'AI 正在生成策略...') }}
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white"><h5 class="mb-0"><i class="bi bi-crosshair"></i> 谈判策略</h5></div>
                <div class="card-body" id="negotiate-result-area">
                    <p class="text-muted text-center py-5 mb-0">请在左侧填写信息后生成建议</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
