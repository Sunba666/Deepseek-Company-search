<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>求职尽调AI助手</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js" as="script">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* ── 向后兼容 shim（旧类名 → 新变量） ── */
        .bg-secondary-custom { background: var(--bg-alt) !important; }
        .text-primary-custom { color: var(--ink) !important; }
        .text-muted-custom { color: var(--ink-secondary) !important; }
        .border-custom { border-color: var(--border) !important; }
        
        /* ── 当前样式表中未包含的例外样式 ── */
        .gradient-title {
            color: var(--primary);
            font-weight: 700;
        }
        
        .search-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .quick-search-tags {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .header-badges {
            margin-top: 1rem;
        }
        .header-badges .badge {
            margin-right: 0.5rem;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }
        .htmx-request #search-btn-text {
            display: none;
        }
        #search-spinner {
            margin-left: 0.5rem;
        }
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4" style="background: var(--surface); border-bottom: 1px solid var(--border);">
        <div class="container">
            <a class="navbar-brand" href="/" style="color: var(--primary) !important; font-weight: 700;">
                <i class="bi bi-building"></i> 求职尽调
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a>
                    <a class="nav-link" href="/dashboard"><i class="bi bi-search"></i> 公司查询</a>
                    <a class="nav-link" href="/companies"><i class="bi bi-building"></i> 企业名录</a>
                    <a class="nav-link" href="/compare"><i class="bi bi-arrows"></i> 公司对比</a>
                    <a class="nav-link" href="/offer-compare"><i class="bi bi-cash-stack"></i> Offer对比</a>
                    <a class="nav-link" href="/jobboard"><i class="bi bi-kanban"></i> 求职看板</a>
                    <a class="nav-link" href="/job-match"><i class="bi bi-search-heart"></i> 求职匹配</a>
                    <a class="nav-link" href="/resume-optimizer"><i class="bi bi-file-text"></i> 简历优化</a>
                    <a class="nav-link" href="/admin/system"><i class="bi bi-heart-pulse"></i> 系统状态</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <!-- 深色模式切换按钮 -->
    <!-- API 配置面板（由 HTMX 加载） -->
    <div class="container mt-4" id="api-config-section"
         hx-get="/api/config/status"
         hx-trigger="load, config-updated from:body"
         hx-swap="innerHTML">
        <div class="text-center py-3 text-muted">
            <div class="spinner-border spinner-border-sm" role="status"></div>
            <small class="ms-2">加载 API 状态...</small>
        </div>
    </div>

    <!-- API 配置弹窗 -->
    <div class="modal fade" id="apiConfigModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" id="apiConfigModalContent">
                <div class="modal-body text-center py-4">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="切换深色模式" title="切换深色模式">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
    
    <script src="https://cdn.bootcdn.net/ajax/libs/htmx/1.9.6/htmx.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script>
        // 安全的localStorage操作
        const safeStorage = {
            getItem: function(key) {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    console.warn('localStorage access blocked:', e.message);
                    return null;
                }
            },
            setItem: function(key, value) {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    console.warn('localStorage access blocked:', e.message);
                }
            }
        };
        
        // 深色模式切换功能
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        // 从localStorage读取主题设置
        const savedTheme = safeStorage.getItem('theme') || 'light';
        
        // 初始化主题
        function initTheme() {
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon();
        }
        
        // 更新图标
        function updateThemeIcon() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (themeIcon) {
                if (currentTheme === 'dark') {
                    themeIcon.className = 'bi bi-sun-fill';
                } else {
                    themeIcon.className = 'bi bi-moon-fill';
                }
            }
        }
        
        // 切换主题
        if (themeToggle) {
            themeToggle.addEventListener('click', function() {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-theme', newTheme);
                safeStorage.setItem('theme', newTheme);
                updateThemeIcon();
                
                // 如果页面有图表，重新渲染
                if (window.radarChartInstance) {
                    window.radarChartInstance.resize();
                }
            });
        }
        
        // 页面加载时初始化主题
        initTheme();
        
        // 监听系统主题变化
        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                if (!safeStorage.getItem('theme')) {
                    const newTheme = e.matches ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', newTheme);
                    updateThemeIcon();
                }
            });
        }
        
        // 全局错误捕获
        window.addEventListener('error', function(e) {
            console.error('Global error caught:', e.message, e.filename, e.lineno);
            e.preventDefault();
        });
        
        // 使用pagehide替代unload事件（兼容性更好）
        document.addEventListener('pagehide', function(e) {
            // 页面隐藏时的清理工作
            if (window.radarChartInstance) {
                window.radarChartInstance.dispose();
                window.radarChartInstance = null;
            }
        });
    </script>
    
    <!-- 全局请求调试工具 -->
    <!-- 【修复】原实现拦截所有XHR/Fetch并打印完整响应内容到Console，会泄露API Key和用户数据。 -->
    <!-- 现改为仅打印请求URL和状态码，详细日志只在URL参数 ?debug=1 时启用。 -->
    <script>
    (function() {
        var isDebug = new URLSearchParams(window.location.search).has('debug');

        // 拦截 XMLHttpRequest - 仅记录URL和状态码
        var XHR = XMLHttpRequest;
        var originalOpen = XHR.prototype.open;
        var originalSend = XHR.prototype.send;

        XHR.prototype.open = function(method, url, async, user, password) {
            this._url = url;
            return originalOpen.apply(this, arguments);
        };

        XHR.prototype.send = function(body) {
            this.addEventListener('load', function() {
                var url = this._url || '';
                if (isDebug) {
                    console.log('[XHR]', this.status, url);
                }
                // 仅在错误状态码时始终打印
                if (this.status >= 400) {
                    console.warn('[XHR Error]', this.status, url);
                }
            });
            return originalSend.apply(this, arguments);
        };

        // 拦截全局错误
        window.addEventListener('error', function(e) {
            if (e.message) {
                console.warn('[Error]', e.message, e.filename, e.lineno);
            }
        }, true);
    })();
    </script>
    
    {% block scripts %}{% endblock %}
<!-- 全局错误拦截器（防止未捕获错误导致白屏） -->
<script>
(function() {
    // 全局错误拦截
    window.addEventListener('error', function(e) {
        var msg = (e.message || e.error || '') + '';
        if (msg.includes('v[w] is not a function') || 
            msg.includes('Invalid left-hand side') ||
            msg.includes('is not defined')) {
            console.warn('[Reasonix] 已拦截已知错误，页面将继续运行:', msg.slice(0, 80));
            e.preventDefault();
            return false;
        }
    }, true);
    
    // 未捕获 Promise 拒绝
    window.addEventListener('unhandledrejection', function(e) {
        console.warn('[Reasonix] 已拦截 Promise 拒绝:', (e.reason || '').toString().slice(0, 80));
        e.preventDefault();
    });
    
    // localStorage 安全访问
    var origGetItem = Storage.prototype.getItem;
    Storage.prototype.getItem = function(key) {
        try { return origGetItem.call(this, key); }
        catch(e) { return null; }
    };
    var origSetItem = Storage.prototype.setItem;
    Storage.prototype.setItem = function(key, value) {
        try { return origSetItem.call(this, key, value); }
        catch(e) { /* 隐私模式阻止存储，静默忽略 */ }
    };
})();
</script>

</body>
</html>
