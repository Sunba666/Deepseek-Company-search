{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="gradient-title mb-1"><i class="bi bi-kanban"></i> 求职看板</h2>
            <p class="text-muted small mb-0">跟踪你的求职进度，管理目标公司</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
            <i class="bi bi-plus-lg"></i> 添加公司
        </button>
    </div>

    <!-- 看板列表（由 HTMX 加载） -->
    <div id="jobboard-container"
         hx-get="/jobboard/list"
         hx-trigger="load, jobboard-updated from:body"
         hx-swap="innerHTML">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted mt-2">加载中...</p>
        </div>
    </div>
</div>

<!-- 添加公司弹窗 -->
<div class="modal fade" id="addCompanyModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form hx-post="/jobboard/add"
                  hx-target="#jobboard-container"
                  hx-swap="innerHTML"
                  hx-trigger="submit"
                  hx-on::after-request="
                      if(event.detail.successful) {
                          var modal = bootstrap.Modal.getInstance(document.getElementById('addCompanyModal'));
                          if(modal) modal.hide();
                          document.getElementById('addCompanyForm').reset();
                          document.body.dispatchEvent(new Event('jobboard-updated'));
                      }
                  "
                  id="addCompanyForm">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-building-add"></i> 添加目标公司</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">公司名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="company_name"
                               placeholder="输入公司全称或简称" required maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">备注（选填）</label>
                        <textarea class="form-control" name="note" rows="2"
                                  placeholder="如：技术岗、已内推..." maxlength="500"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <span class="spinner-border spinner-border-sm htmx-indicator" role="status"></span>
                        添加
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
// Handle update/delete event delegation for dynamically loaded content
document.addEventListener('click', function(e) {
    // Delete button
    var deleteBtn = e.target.closest('.jobboard-delete');
    if (deleteBtn && confirm('确认删除该公司？')) {
        var recordId = deleteBtn.getAttribute('data-id');
        if (recordId) {
            htmx.ajax('POST', '/jobboard/delete', {
                values: {id: recordId},
                target: '#jobboard-container',
                swap: 'innerHTML'
            });
        }
    }
});
</script>
{% endblock %}
