<div id="result-area">
    <div class="card shadow-sm mb-4" style="border-color: var(--primary);">
        <div class="card-body text-center py-5">
            <div class="mb-4">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">采集中...</span>
                </div>
            </div>
            
            <h4 class="mb-2" style="color: var(--ink-heading);">
                <i class="bi bi-search-heart"></i> 正在全网采集中
            </h4>
            
            <p class="mb-1" style="color: var(--ink); font-size: 1.1rem;">
                「<strong>{{ company_name }}</strong>」的数据正在收集中
            </p>
            
            <p class="text-muted mb-4">
                预计需要 10-20 秒，采集完成后会自动刷新结果，请耐心等待…
            </p>
            
            <div class="progress mb-3" style="height: 6px; max-width: 400px; margin: 0 auto;">
                <div class="progress-bar progress-bar-striped progress-bar-animated"
                     style="width: 100%; background: var(--primary);"></div>
            </div>

            <div class="d-flex justify-content-center gap-4 text-muted small mb-4">
                <span><i class="bi bi-building"></i> 工商信息</span>
                <span><i class="bi bi-people"></i> 员工口碑</span>
                <span><i class="bi bi-shield-exclamation"></i> 风险数据</span>
                <span><i class="bi bi-cash-stack"></i> 薪资福利</span>
            </div>

            <button class="btn btn-outline-primary btn-sm" 
                    hx-post="/company/search"
                    hx-vals='{"company_name": "{{ company_name }}"}'
                    hx-target="#result-area"
                    hx-swap="innerHTML">
                <i class="bi bi-arrow-clockwise"></i> 手动刷新
            </button>
        </div>
    </div>

    <div class="text-center text-muted small">
        <i class="bi bi-info-circle"></i>
        数据来源：国家企业信用信息公示系统、Tavily AI 搜索、公开网络信息
    </div>
</div>
