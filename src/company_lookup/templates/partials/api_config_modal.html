<!-- API 配置弹窗内容（由 HTMX 动态加载） -->
<div class="modal-header">
    <h5 class="modal-title">{{ api.icon }} 配置 {{ api.name }}</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
    <p class="text-muted">{{ api.description }}</p>
    <div class="mb-3">
        <label class="form-label">API Key</label>
        <input type="password" class="form-control" name="api_key" 
               placeholder="请输入 {{ api.name }} API Key"
               autocomplete="off"
               {% if api.configured %}value="{{ api.key_preview }}"{% endif %}>
        <div class="form-text">
            获取 Key：<a href="{{ api.apply_url }}" target="_blank" rel="noopener">{{ api.apply_url }}</a>
        </div>
    </div>
    <input type="hidden" name="api_type" value="{{ api.id }}">
    <div id="config-validation-result"></div>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
    <button type="button" class="btn btn-primary" 
            hx-post="/api/config/save"
            hx-target="#config-validation-result"
            hx-include="[name='api_key'], [name='api_type']"
            hx-indicator="#config-save-spinner">
        <span id="config-save-spinner" class="spinner-border spinner-border-sm htmx-indicator me-1" role="status"></span>
        验证并保存
    </button>
</div>
