{% if result.success %}
<div class="card">
    <div class="card-header d-flex justify-content-between">
        <strong>AI 简历优化报告</strong>
    </div>
    <div class="card-body">
        {{ result.report_html|safe }}
        {% if result.original_length %}
        <div class="mt-3 text-muted small">
            <i class="bi bi-info-circle"></i> 原始简历长度：{{ result.original_length }} 字符
        </div>
        {% endif %}
    </div>
</div>
{% else %}
<div class="alert alert-danger">{{ result.error or '分析没跑通，稍后再试' }}</div>
{% endif %}
