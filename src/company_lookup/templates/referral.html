{% extends "base.html" %}
{% block title %}内推码 — 求职尽调AI助手{% endblock %}
{% block content %}
<style>
    .referral-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
        margin-bottom: 1rem;
        background: var(--surface);
        transition: box-shadow 0.2s;
    }
    .referral-card:hover {
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .referral-card .code-tag {
        font-family: 'Courier New', monospace;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--primary);
        background: var(--bg-alt);
        padding: 0.25rem 0.75rem;
        border-radius: 6px;
        letter-spacing: 1px;
    }
    .badge-status-有效 { background: #d1fae5; color: #065f46; }
    .badge-status-可能已过期 { background: #fef3c7; color: #92400e; }
    .badge-status-已过期 { background: #fee2e2; color: #991b1b; }
    .badge-status-待验证 { background: #e0e7ff; color: #3730a3; }
    .badge-status-可疑 { background: #fce7f3; color: #9d174d; }
    .position-badge {
        font-size: 0.8rem;
        padding: 0.15rem 0.5rem;
        border-radius: 4px;
        background: var(--bg-alt);
        color: var(--ink-secondary);
        margin-right: 0.3rem;
    }
    .filter-bar {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 1.5rem;
    }
    .filter-bar .btn-outline-primary.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
    }
    .stat-card {
        text-align: center;
        padding: 1rem;
        border-radius: 10px;
        background: var(--bg-alt);
    }
    .stat-card .num {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--primary);
    }
    .stat-card .label {
        font-size: 0.85rem;
        color: var(--ink-secondary);
    }
</style>

<div class="mb-4">
    <h2 class="gradient-title"><i class="bi bi-share"></i> 内推码</h2>
    <p class="text-muted">AI 从脉脉、知乎等平台持续采集并验证有效内推码，帮你找到可靠的内推机会</p>
</div>

<!-- 统计卡片 -->
<div class="row mb-4 g-3">
    <div class="col-md-4 col-6">
        <div class="stat-card">
            <div class="num">{{ codes|length }}</div>
            <div class="label">有效内推码</div>
        </div>
    </div>
    <div class="col-md-4 col-6">
        <div class="stat-card">
            <div class="num">{{ categories|length }}</div>
            <div class="label">职位分类</div>
        </div>
    </div>
    <div class="col-md-4 col-6">
        <div class="stat-card">
            <div class="num" id="total-report-count">0</div>
            <div class="label">用户反馈</div>
        </div>
    </div>
</div>

<!-- 搜索 + 筛选栏 -->
<form hx-get="/referral/search" hx-target="#referral-list" hx-trigger="submit, keyup changed delay:300ms from:#searchKeyword"
      class="filter-bar" id="searchForm">
    <div class="input-group" style="max-width: 350px;">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" id="searchKeyword" name="keyword"
               placeholder="搜公司名或内推码...">
    </div>
    <div class="btn-group" role="group" id="categoryFilter">
        <button type="button" class="btn btn-outline-primary btn-sm active" data-category=""
                onclick="selectCategory(this)">全部</button>
        {% for cat in categories %}
        <button type="button" class="btn btn-outline-primary btn-sm" data-category="{{ cat }}"
                onclick="selectCategory(this)">{{ cat }}</button>
        {% endfor %}
    </div>
    <input type="hidden" name="category" id="hiddenCategory" value="">
</form>

<!-- 内推码列表 -->
<div id="referral-list">
    {% include "partials/referral_list.html" %}
</div>

<script>
function selectCategory(btn) {
    document.querySelectorAll('#categoryFilter .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('hiddenCategory').value = btn.dataset.category || '';
    document.getElementById('searchForm').requestSubmit();
}

document.getElementById('searchKeyword').addEventListener('input', function() {
    document.querySelectorAll('#categoryFilter .btn').forEach(b => b.classList.remove('active'));
    document.querySelector('#categoryFilter .btn[data-category=""]').classList.add('active');
    document.getElementById('hiddenCategory').value = '';
});
</script>
{% endblock %}
