{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-4" style="max-width:1000px;">

    <div class="text-center mb-4">
        <h4><i class="bi bi-search-heart me-2"></i>求职匹配</h4>
        <p class="text-muted small">告诉我们你的偏好，系统从知识库中智能匹配适合你的公司</p>
    </div>

    <div class="row g-4">
        <!-- 偏好输入 -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white"><strong><i class="bi bi-sliders me-1"></i>我的偏好</strong></div>
                <div class="card-body">
                    <form id="matchForm">
                        <div class="mb-3">
                            <label class="form-label small">行业偏好</label>
                            <select class="form-select form-select-sm" id="industry">
                                <option value="">不限</option>
                                {% for ind in ['互联网','游戏','AI','新能源','生物医药','硬件/制造','金融'] %}
                                <option value="{{ ind }}">{{ ind }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">省份</label>
                            <select class="form-select form-select-sm" id="province" onchange="updateCities()">
                                <option value="">不限</option>
                                {% for prov, cities in provinces.items() %}
                                <option value="{{ prov }}">{{ prov }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">城市</label>
                            <select class="form-select form-select-sm" id="city">
                                <option value="">不限</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">最低月薪 (K)</label>
                            <input type="range" class="form-range" id="salary" min="0" max="80" step="5" value="15">
                            <div class="d-flex justify-content-between small text-muted">
                                <span>不限</span>
                                <span id="salaryLabel">15K</span>
                                <span>80K+</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">风险容忍度</label>
                            <select class="form-select form-select-sm" id="riskTolerance">
                                <option value="低">低 — 只看无风险公司</option>
                                <option value="中" selected>中 — 可接受合理风险</option>
                                <option value="高">高 — 成长比稳定重要</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">公司阶段</label>
                            <select class="form-select form-select-sm" id="growthStage">
                                <option value="">不限</option>
                                <option value="初创">初创期</option>
                                <option value="成长">成长期</option>
                                <option value="成熟">成熟期</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="matchBtn">
                            <i class="bi bi-search"></i> 开始匹配
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 匹配结果 -->
        <div class="col-md-8">
            <div id="resultArea">
                <div class="card shadow-sm">
                    <div class="card-body text-center py-5 text-muted">
                        <i class="bi bi-arrow-left" style="font-size:2rem;"></i>
                        <p class="mt-2">选择偏好后点击"开始匹配"</p>
                        <small>系统将从 {{ stats.total_companies if stats else 189 }} 家公司中为你推荐</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.match-card { transition: transform 0.15s; }
.match-card:hover { transform: translateY(-2px); }
.reason-tag { background:var(--primary-light); border-radius:20px; padding:2px 10px; font-size:0.75rem; display:inline-block; margin:2px; }
.score-badge { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.9rem; flex-shrink:0; }
</style>
{% endblock %}

{% block scripts %}
<script>
// 省份-城市数据
const PROVINCE_CITIES = {{ provinces | tojson | safe }};

// 省份联动：选择省份后更新城市下拉列表
function updateCities() {
    const prov = document.getElementById('province').value;
    const citySelect = document.getElementById('city');
    citySelect.innerHTML = '<option value="">不限</option>';
    if (prov && PROVINCE_CITIES[prov]) {
        PROVINCE_CITIES[prov].forEach(c => {
            citySelect.innerHTML += `<option value="${c}">${c}</option>`;
        });
        citySelect.disabled = false;
    } else if (!prov) {
        // 不限省份时显示所有城市
        const allCities = [...new Set(Object.values(PROVINCE_CITIES).flat())];
        allCities.sort().forEach(c => {
            citySelect.innerHTML += `<option value="${c}">${c}</option>`;
        });
        citySelect.disabled = false;
    } else {
        citySelect.disabled = true;
    }
}
// 初始加载时填充所有城市
updateCities();

const slider = document.getElementById('salary');
const salaryLabel = document.getElementById('salaryLabel');
slider.addEventListener('input', function() {
    salaryLabel.textContent = this.value == 0 ? '不限' : this.value + 'K';
});

document.getElementById('matchForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('matchBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>匹配中...';
    btn.disabled = true;

    try {
        const resp = await fetch('/api/job-match', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                industry: document.getElementById('industry').value,
                province: document.getElementById('province').value,
                city: document.getElementById('city').value,
                min_salary: parseInt(document.getElementById('salary').value),
                risk_tolerance: document.getElementById('riskTolerance').value,
                growth_stage: document.getElementById('growthStage').value,
                top_n: 20,
            })
        });
        const data = await resp.json();
        renderResults(data.data);
    } catch (err) {
        alert('匹配失败: ' + err.message);
    } finally {
        btn.innerHTML = '<i class="bi bi-search"></i> 开始匹配';
        btn.disabled = false;
    }
});

function renderResults(data) {
    const area = document.getElementById('resultArea');
    if (!data.results || data.results.length === 0) {
        area.innerHTML = `<div class="card shadow-sm"><div class="card-body text-center py-4 text-muted"><i class="bi bi-emoji-frown" style="font-size:2rem;"></i><p class="mt-2">未找到匹配的公司，试试放宽条件</p></div></div>`;
        return;
    }

    let html = `<div class="d-flex justify-content-between align-items-center mb-2">
        <small class="text-muted">共匹配 ${data.total_matched} 家，展示前 ${data.results.length} 家</small>
    </div>`;

    data.results.forEach((item, i) => {
        const scoreColor = item.score >= 70 ? '#43e97b' : item.score >= 50 ? '#f093fb' : '#667eea';
        const hotnessBadge = item.hotness === 'high' ? '<span class="badge bg-danger ms-1">热门</span>' :
                             item.hotness === 'low' ? '<span class="badge bg-secondary ms-1">小众</span>' : '';
        const reasons = item.reasons.map(r => `<span class="reason-tag">${r}</span>`).join('');

        html += `<div class="card shadow-sm mb-2 match-card">
            <div class="card-body py-2">
                <div class="d-flex align-items-center gap-3">
                    <div class="score-badge" style="background:${scoreColor};color:#fff;">${item.score}</div>
                    <div class="flex-grow-1">
                        <div class="d-flex align-items-center">
                            <strong>${item.name}</strong>${hotnessBadge}
                            <small class="text-muted ms-2">${item.industry || ''}</small>
                            ${item.city ? `<small class="text-muted ms-2"><i class="bi bi-geo-alt"></i> ${item.city}${item.province ? ' · '+item.province : ''}</small>` : ''}
                        </div>
                        ${item.one_liner ? `<small class="text-muted d-block">${item.one_liner}</small>` : ''}
                        <div class="mt-1">${reasons}</div>
                    </div>
                    <a href="/company/detail/${item.id}" class="btn btn-sm btn-outline-primary" target="_blank">查看</a>
                </div>
            </div>
        </div>`;
    });

    area.innerHTML = html;
}
</script>
{% endblock %}
